name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core dependencies (CPU torch)
        run: |
          python -m pip install -U pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.1.0
          pip install -r requirements-core.txt

      - name: Run test suite
        run: python -m pytest -q

      - name: Regenerate figures from committed results (smoke check)
        run: python src/make_figures.py

      - name: Reproduce robustness results (fast, no GPU)
        run: |
          python src/robustness_ci.py --data data/processed/chicago_taxi_sides.csv --B 500
